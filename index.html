<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>LEAN MASS UP</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="top">
      <div class="top-title">LEAN MASS UP</div>
      <button class="top-btn" onclick="showHistory()">&#9776;</button>
    </div>
    <div class="tabs">
      <div class="tab on" data-d="A" onclick="pick('A')"><b>A</b><small>Chest+Tri</small></div>
      <div class="tab" data-d="B" onclick="pick('B')"><b>B</b><small>Back+Bi</small></div>
      <div class="tab" data-d="C" onclick="pick('C')"><b>C</b><small>Shoulder</small></div>
    </div>
    <div id="main"></div>
    <div class="finish" id="finish" style="display:none">
      <button class="finish-btn" onclick="finish()">FINISH WORKOUT</button>
    </div>
    <div id="hist-modal" class="modal hide">
      <div class="m-head"><h2>History</h2><button class="m-close" onclick="closeHist()">&times;</button></div>
      <div id="hist-body"></div>
    </div>
    <div id="det-modal" class="modal hide">
      <div class="m-head"><h2 id="det-title"></h2><button class="m-close" onclick="closeDet()">&times;</button></div>
      <div class="d-body" id="det-body"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
